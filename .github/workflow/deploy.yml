name: Deploy to VPS

on: 
  push:
    branch: 
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{secret.VPS_HOST}}
          username: ${{secret.VPS_USER}}
          key: ${{secret.VPS_SSH_KEY}}
          script: |
            cd ~/prod-stack
            git pull origin main